<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BCH Maintenance System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f0f4f8; color: #333; }
        .card { border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); border: none; }
        .btn { border-radius: 10px; font-weight: 500; }
        .clickable-row { cursor: pointer; transition: background-color 0.2s; }
        .clickable-row:hover { background-color: #e2e6ea !important; }
        #reader { width: 100%; border-radius: 12px; overflow: hidden; background: #000; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark bg-primary sticky-top mb-4 d-none" id="navbar">
        <div class="container">
            <span class="navbar-brand fw-bold">🏥 BCH Maintenance</span>
            <button class="btn btn-light btn-sm text-primary fw-bold" onclick="logout()">ออกจากระบบ</button>
        </div>
    </nav>

    <div class="container pb-5">
        <div id="loginSection" class="card mt-5 mx-auto" style="max-width: 420px;">
            <div class="card-body p-4 text-center">
                <h3 class="card-title mb-4 fw-bold text-primary">เข้าสู่ระบบ</h3>
                <input type="text" id="username" class="form-control mb-3" placeholder="Username">
                <input type="password" id="password" class="form-control mb-4" placeholder="Password">
                <button class="btn btn-primary w-100 py-2.5" onclick="login()">Login</button>
            </div>
        </div>

        <div id="menuSection" class="d-none text-center mt-5">
            <h4 class="mb-4 text-secondary">เมนูหลัก</h4>
            <div class="d-grid gap-3 d-sm-flex justify-content-center">
                <button class="btn btn-success btn-lg px-5 py-3 shadow" onclick="showCheckMenu()">🔍 ตรวจสอบเครื่อง</button>
                <button class="btn btn-warning btn-lg px-5 py-3 shadow d-none text-white" id="btnManage" onclick="showManageMenu()">⚙️ จัดการเครื่อง (Admin)</button>
            </div>
        </div>

        <div id="scanSection" class="d-none mx-auto" style="max-width: 500px;">
            <div class="card p-4">
                <h4 class="mb-3 text-center fw-bold">ค้นหาเครื่อง / QR Code</h4>
                <div id="reader" class="mb-3"></div>
                <button class="btn btn-info w-100 mb-3 text-white" onclick="startScanner()">📷 เปิดกล้องสแกน QR</button>
                <hr>
                <div class="input-group mb-4">
                    <input type="text" id="machineId" class="form-control" placeholder="รหัสเครื่อง เช่น AC-001">
                    <button class="btn btn-primary px-4" onclick="searchMachine()">ค้นหา</button>
                </div>
                <button class="btn btn-secondary w-100" onclick="backToMenu()">กลับหน้าหลัก</button>
            </div>
        </div>

        <div id="manageSection" class="d-none">
            <div class="card p-4 mb-4">
                <div class="row g-3 align-items-center mb-3">
                    <div class="col-12 col-md-4">
                        <h4 class="fw-bold text-primary m-0">🛠️ ระบบจัดการเครื่อง</h4>
                    </div>
                    <div class="col-12 col-md-8 text-md-end">
                        <button class="btn btn-success me-2" onclick="openProductModal(null)">＋ เพิ่มเครื่องใหม่</button>
                        <button class="btn btn-secondary" onclick="backToMenu()">กลับ</button>
                    </div>
                </div>
                
                <div class="row g-2 bg-light p-3 rounded-3 mb-3">
                    <div class="col-6 col-md-3">
                        <input type="text" id="filterSearch" class="form-control" placeholder="ค้นหา รหัส/ชื่อ" oninput="filterMachines()">
                    </div>
                    <div class="col-6 col-md-3">
                        <select id="filterType" class="form-select" onchange="filterMachines()"></select>
                    </div>
                    <div class="col-6 col-md-3">
                        <select id="filterStatus" class="form-select" onchange="filterMachines()">
                            <option value="">-- ทุกสถานะ --</option>
                            <option value="ปกติ">ปกติ</option>
                            <option value="ผิดปกติ">ผิดปกติ</option>
                            <option value="รอเปลี่ยนอะไหล่">รอเปลี่ยนอะไหล่</option>
                        </select>
                    </div>
                    <div class="col-6 col-md-3">
                        <select id="filterMonth" class="form-select" onchange="filterMachines()">
                            <option value="">-- ทุกเดือนที่ตรวจล่าสุด --</option>
                            <option value="01">มกราคม</option>
                            <option value="02">กุมภาพันธ์</option>
                            <option value="03">มีนาคม</option>
                            <option value="04">เมษายน</option>
                            <option value="05">พฤษภาคม</option>
                            <option value="06">มิถุนายน</option>
                            <option value="07">กรกฎาคม</option>
                            <option value="08">สิงหาคม</option>
                            <option value="09">กันยายน</option>
                            <option value="10">ตุลาคม</option>
                            <option value="11">พฤศจิกายน</option>
                            <option value="12">ธันวาคม</option>
                        </select>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table table-hover align-middle text-center">
                        <thead class="table-primary">
                            <tr><th>รหัส</th><th>ชื่อเครื่อง</th><th>ประเภท</th><th>สถานะ</th><th>ตรวจล่าสุด</th></tr>
                        </thead>
                        <tbody id="machineTableBody"></tbody>
                    </table>
                    <small class="text-muted">* คลิกที่แถวเพื่อแก้ไขข้อมูลเครื่อง</small>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="checkModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content card">
                <div class="modal-header bg-success text-white border-0">
                    <h5 class="modal-title fw-bold">📝 บันทึกผลตรวจเช็ค</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="text-center mb-3">
                        <img id="modalMachineImg" src="" class="img-fluid rounded d-none" style="max-height: 200px; object-fit: cover;">
                    </div>
                    <h5 class="fw-bold text-primary" id="modalMachineName">ชื่อเครื่อง...</h5>
                    <p class="mb-2 text-muted" id="modalMachineType">ประเภท: ...</p>
                    
                    <div class="bg-primary bg-opacity-10 p-3 rounded mb-3">
                        <div class="row align-items-center mb-2">
                            <div class="col-5 text-secondary">วันที่เริ่มใช้งาน:</div>
                            <div class="col-7 fw-bold" id="modalStartDate">-</div>
                        </div>
                        <div class="row align-items-center mb-2">
                            <div class="col-5 text-secondary">อายุการใช้งาน:</div>
                            <div class="col-7 fw-bold text-primary" id="modalAge">-</div>
                        </div>
                        <div class="row align-items-center">
                            <div class="col-5 text-secondary">วันตรวจล่าสุด:</div>
                            <div class="col-7 fw-bold" id="modalLastCheck">-</div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold text-secondary">รายการตรวจสอบ</label>
                        <div id="dynamicCheckboxes" class="p-2 border rounded bg-light"></div>
                    </div>

                    <div class="form-check form-switch mb-3">
                        <input class="form-check-input" type="checkbox" id="chkChangePart" onchange="togglePartsSection()">
                        <label class="form-check-label fw-bold text-danger" for="chkChangePart">🛠️ มีการเปลี่ยนอะไหล่</label>
                    </div>

                    <div id="partsSection" class="d-none bg-warning bg-opacity-10 p-3 rounded mb-3 border border-warning">
                        <label class="form-label fw-bold">เลือกอะไหล่ที่เปลี่ยน</label>
                        <div id="partCheckboxes" class="mb-3 p-2 bg-white border rounded" style="max-height: 150px; overflow-y: auto;"></div>
                        
                        <label class="form-label fw-bold text-primary">+ เพิ่มอะไหล่ใหม่</label>
                        <div class="input-group mb-2">
                            <input type="text" id="newPartName" class="form-control" placeholder="ชื่ออะไหล่">
                            <input type="number" id="newPartPrice" class="form-control" placeholder="ราคา" style="max-width: 100px;">
                            <button class="btn btn-primary" onclick="addNewPartToUI()">เพิ่ม</button>
                        </div>
                        
                        <div class="mt-2 text-end">
                            <label class="fw-bold">ราคารวม: <span id="totalPartsPrice" class="text-danger">0</span> บาท</label>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">สถานะ</label>
                        <select class="form-select" id="modalStatus">
                            <option value="ปกติ">ปกติ</option>
                            <option value="ผิดปกติ">ผิดปกติ</option>
                            <option value="รอเปลี่ยนอะไหล่">รอเปลี่ยนอะไหล่</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">บันทึกเพิ่มเติม</label>
                        <textarea class="form-control" id="modalNote" rows="2"></textarea>
                    </div>
                    <input type="hidden" id="modalMachineId">
                    <input type="hidden" id="modalCheckCount">
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">ปิด</button>
                    <button type="button" class="btn btn-success px-4" onclick="saveCheck()">บันทึกข้อมูล</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="productModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content card">
                <div class="modal-header bg-primary text-white border-0">
                    <h5 class="modal-title fw-bold" id="productModalTitle">เพิ่มเครื่องใหม่</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="row g-3">
                        <div class="col-md-4 text-center">
                            <img id="pImgPreview" src="" class="img-fluid rounded mb-2 d-none" style="max-height: 150px; object-fit: cover;">
                            <label class="form-label fw-bold d-block">ถ่ายรูป/อัปโหลดรูปภาพ</label>
                            <input type="file" id="pImageFile" class="form-control form-control-sm" accept="image/*" capture="environment">
                            <input type="hidden" id="pOldImgUrl">
                        </div>
                        <div class="col-md-8">
                            <div class="row g-2">
                                <div class="col-sm-6">
                                    <label class="form-label fw-bold">รหัสเครื่อง</label>
                                    <input type="text" id="pId" class="form-control">
                                </div>
                                <div class="col-sm-6">
                                    <label class="form-label fw-bold">วันที่เริ่มใช้</label>
                                    <input type="date" id="pStartDate" class="form-control">
                                </div>
                                <div class="col-sm-6">
                                    <label class="form-label fw-bold">เลขที่ทรัพย์สิน</label>
                                    <input type="text" id="pAssetNo" class="form-control">
                                </div>
                                <div class="col-sm-6">
                                    <label class="form-label fw-bold">ประเภท</label>
                                    <input type="text" id="pType" class="form-control">
                                </div>
                                <div class="col-12">
                                    <label class="form-label fw-bold">ชื่อเครื่อง</label>
                                    <input type="text" id="pName" class="form-control">
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-6">
                            <label class="form-label fw-bold">รอบเวลาตรวจ</label>
                            <div class="input-group">
                                <input type="number" id="pCycleNum" class="form-control" placeholder="จำนวน" min="1">
                                <select id="pCycleUnit" class="form-select">
                                    <option value="d">วัน (Days)</option>
                                    <option value="m">เดือน (Months)</option>
                                    <option value="y">ปี (Years)</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-sm-6">
                            <label class="form-label fw-bold">สถานะ</label>
                            <select id="pStatus" class="form-select">
                                <option value="ปกติ">ปกติ</option>
                                <option value="ผิดปกติ">ผิดปกติ</option>
                                <option value="รอเปลี่ยนอะไหล่">รอเปลี่ยนอะไหล่</option>
                                <option value="จำหน่ายแล้ว">จำหน่ายแล้ว</option>
                            </select>
                        </div>
                        
                        <div class="col-12 border-top pt-3 mt-3">
                            <label class="form-label fw-bold text-primary">รายการตรวจสอบ</label>
                            <div id="editCheckListContainer" class="bg-light p-2 rounded"></div>
                            <button type="button" class="btn btn-sm btn-outline-primary mt-2" onclick="addEditCheckItem()">+ เพิ่มรายการตรวจ</button>
                        </div>
                        
                        <div class="col-12 border-top pt-3 mt-3">
                            <label class="form-label fw-bold text-primary">รายการอะไหล่และราคา</label>
                            <div id="editPartsContainer" class="bg-light p-2 rounded"></div>
                            <button type="button" class="btn btn-sm btn-outline-primary mt-2" onclick="addEditPartItem()">+ เพิ่มอะไหล่</button>
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">ยกเลิก</button>
                    <button type="button" class="btn btn-primary px-4" onclick="saveProduct()">บันทึกข้อมูลเครื่อง</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="app.js"></script>
</body>
</html>
